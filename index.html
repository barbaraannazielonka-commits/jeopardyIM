<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Jeopardy!</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet" />
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #060b2e; font-family: 'Barlow Condensed', sans-serif; color: white; min-height: 100vh; }
  #app { padding: 12px; min-height: 100vh; }

  .screen { display: none; }
  .screen.active { display: block; }

  /* ── SETUP ── */
  #setup-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 96vh; gap: 24px; }
  #setup-screen.active { display: flex; }

  .game-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 80px;
    letter-spacing: 8px;
    color: #f5c518;
    text-align: center;
  }

  .setup-card {
    background: #0d1a5e;
    border: 2px solid #1e3a9f;
    border-radius: 16px;
    padding: 36px 44px;
    width: 100%;
    max-width: 500px;
  }
  .setup-card h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 2px;
    color: #f5c518;
    margin-bottom: 22px;
    text-align: center;
  }

  .team-count-row { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 28px; }
  .count-btn {
    width: 48px; height: 48px;
    border-radius: 50%;
    border: 2px solid #f5c518;
    background: transparent;
    color: #f5c518;
    font-size: 28px;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.15s;
    line-height: 1;
  }
  .count-btn:hover { background: #f5c518; color: #060b2e; }
  .count-display { font-family: 'Bebas Neue', sans-serif; font-size: 60px; color: white; min-width: 60px; text-align: center; }

  .team-names { display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px; }
  .team-input-row { display: flex; align-items: center; gap: 12px; }
  .team-dot { width: 16px; height: 16px; border-radius: 50%; flex-shrink: 0; }
  .team-names input {
    flex: 1;
    background: #060b2e;
    border: 1.5px solid #1e3a9f;
    border-radius: 8px;
    padding: 11px 16px;
    color: #ffffff;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 20px;
    font-weight: 600;
    outline: none;
    transition: border-color 0.15s;
  }
  .team-names input::placeholder { color: #7a9bff; }
  .team-names input:focus { border-color: #f5c518; }

  .start-btn {
    width: 100%;
    padding: 18px;
    background: #f5c518;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    letter-spacing: 3px;
    color: #060b2e;
    cursor: pointer;
    transition: all 0.15s;
    display: block;
  }
  .start-btn:hover { background: #ffd740; transform: translateY(-2px); }

  /* ── GAME BOARD ── */
  #game-screen { display: none; flex-direction: column; gap: 10px; }
  #game-screen.active { display: flex; }

  .scoreboard { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; margin-bottom: 6px; }
  .score-card {
    background: #0d1a5e;
    border: 2px solid #1e3a9f;
    border-radius: 10px;
    padding: 8px 20px;
    text-align: center;
    min-width: 130px;
    transition: border-color 0.2s, transform 0.2s;
  }
  .score-card .tname { font-size: 16px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; }
  .score-card .tscore { font-family: 'Bebas Neue', sans-serif; font-size: 36px; color: #f5c518; }

  .board { display: grid; gap: 6px; }
  .cat-header {
    background: #0d1a5e;
    border: 2px solid #1e3a9f;
    border-radius: 8px;
    padding: 12px 6px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 1px;
    color: #ffffff;
    line-height: 1.15;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 70px;
  }
  .cell {
    background: #0d1a5e;
    border: 2px solid #1e3a9f;
    border-radius: 8px;
    padding: 6px;
    text-align: center;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #f5c518;
    cursor: pointer;
    min-height: 60px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    user-select: none;
  }
  .cell:hover { background: #1a2d8a; border-color: #f5c518; transform: scale(1.03); }
  .cell.used { background: #040920; border-color: #0a1240; color: transparent; cursor: default; pointer-events: none; }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.88);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 100;
    padding: 16px;
  }
  .modal-overlay.hidden { display: none; }
  .modal {
    background: #0d1a5e;
    border: 3px solid #1e3a9f;
    border-radius: 16px;
    width: 100%;
    max-width: 680px;
    padding: 36px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }
  .modal-cat { font-size: 17px; font-weight: 700; letter-spacing: 2px; color: #7a9bff; text-transform: uppercase; text-align: center; }
  .modal-value { font-family: 'Bebas Neue', sans-serif; font-size: 44px; color: #f5c518; text-align: center; }
  .modal-clue { font-family: 'Bebas Neue', sans-serif; font-size: 36px; text-align: center; line-height: 1.2; color: #ffffff; }
  .reveal-btn {
    background: #f5c518;
    border: none;
    border-radius: 10px;
    padding: 16px 28px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 26px;
    letter-spacing: 2px;
    color: #060b2e;
    cursor: pointer;
    transition: all 0.15s;
    align-self: center;
  }
  .reveal-btn:hover { background: #ffd740; }
  .modal-answer {
    background: #060b2e;
    border: 2px solid #f5c518;
    border-radius: 10px;
    padding: 20px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 32px;
    color: #f5c518;
    text-align: center;
  }
  .scoring-row { display: flex; flex-direction: column; gap: 12px; }
  .scoring-label { font-size: 15px; font-weight: 700; letter-spacing: 1px; color: #7a9bff; text-transform: uppercase; text-align: center; }
  .team-btns { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; }
  .team-score-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 2px solid;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    letter-spacing: 1px;
    cursor: pointer;
    background: transparent;
    transition: all 0.15s;
  }
  .modal-footer { display: flex; justify-content: center; }
  .close-btn {
    background: transparent;
    border: 2px solid #7a9bff;
    border-radius: 8px;
    padding: 12px 32px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    color: #7a9bff;
    cursor: pointer;
    letter-spacing: 1px;
    transition: all 0.15s;
  }
  .close-btn:hover { background: rgba(122,155,255,0.15); }

  /* ── FINAL ── */
  #final-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 96vh; gap: 28px; }
  #final-screen.active { display: flex; }
  .winner-title { font-family: 'Bebas Neue', sans-serif; font-size: 68px; color: #f5c518; letter-spacing: 4px; text-align: center; }
  .final-scores { display: flex; flex-direction: column; gap: 10px; width: 100%; max-width: 420px; }
  .final-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #0d1a5e;
    border: 2px solid #1e3a9f;
    border-radius: 10px;
    padding: 14px 22px;
  }
  .final-row.winner { border-color: #f5c518; }
  .final-row .fname { font-size: 22px; font-weight: 700; color: white; }
  .final-row .fscore { font-family: 'Bebas Neue', sans-serif; font-size: 34px; color: #f5c518; }
  .play-again-btn {
    padding: 18px 48px;
    background: #f5c518;
    border: none;
    border-radius: 10px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 30px;
    letter-spacing: 3px;
    color: #060b2e;
    cursor: pointer;
    transition: all 0.15s;
  }
  .play-again-btn:hover { background: #ffd740; transform: translateY(-2px); }
</style>
</head>
<body>
<div id="app">

  <!-- SETUP -->
  <div id="setup-screen" class="active">
    <div class="game-title">JEOPARDY!</div>
    <div class="setup-card">
      <h2>How many teams?</h2>
      <div class="team-count-row">
        <button class="count-btn" id="dec-btn">−</button>
        <div class="count-display" id="count-disp">3</div>
        <button class="count-btn" id="inc-btn">+</button>
      </div>
      <div class="team-names" id="team-names-list"></div>
      <button class="start-btn" id="start-btn">START GAME</button>
    </div>
  </div>

  <!-- GAME -->
  <div id="game-screen">
    <div class="scoreboard" id="scoreboard"></div>
    <div class="board" id="board"></div>
  </div>

  <!-- FINAL -->
  <div id="final-screen">
    <div class="winner-title" id="winner-text">🏆 WINNER!</div>
    <div class="final-scores" id="final-scores"></div>
    <button class="play-again-btn" id="play-again-btn">PLAY AGAIN</button>
  </div>

</div>

<!-- MODAL -->
<div class="modal-overlay hidden" id="modal">
  <div class="modal">
    <div class="modal-cat" id="modal-cat"></div>
    <div class="modal-value" id="modal-value"></div>
    <div class="modal-clue" id="modal-clue"></div>
    <button class="reveal-btn" id="reveal-btn">REVEAL ANSWER</button>
    <div class="modal-answer" id="modal-answer" style="display:none"></div>
    <div class="scoring-row" id="scoring-row" style="display:none">
      <div class="scoring-label">✅ Award points to:</div>
      <div class="team-btns" id="correct-btns"></div>
      <div class="scoring-label" style="margin-top:4px">❌ Deduct points from:</div>
      <div class="team-btns" id="wrong-btns"></div>
    </div>
    <div class="modal-footer">
      <button class="close-btn" id="close-btn">CLOSE QUESTION</button>
    </div>
  </div>
</div>

<script>
  const TEAM_COLORS = ['#f5c518','#4ade80','#f87171','#60a5fa','#e879f9','#fb923c'];

  const DATA = [
    { cat: "Famous Video Games", qs: [
      { v:100, clue:"This blocks-only sandbox game developed by Mojang is the best-selling video game of all time.", ans:"Minecraft" },
      { v:200, clue:"In this 2020 Nintendo game, players escape to a deserted island to catch bugs, fish, and pay off debt to Tom Nook.", ans:"Animal Crossing: New Horizons" },
      { v:300, clue:"This battle royale game features 100 players dropping from a flying Battle Bus and includes a unique building mechanic.", ans:"Fortnite" },
      { v:400, clue:"This legendary open-world game set in the land of Hyrule won Game of the Year in 2017 with its Breath of the Wild title.", ans:"The Legend of Zelda" },
      { v:500, clue:"Released in 2013, this massive Rockstar game follows three criminals in the fictional city of Los Santos.", ans:"Grand Theft Auto V (GTA 5)" },
      { v:600, clue:"This highly competitive tactical shooter developed by Riot Games pits two teams of five against each other using Agents.", ans:"Valorant" }
    ]},
    { cat: "Social Media Platforms", qs: [
      { v:100, clue:"This short-form video platform relies heavily on its powerful For You Page algorithm to trend music and challenges.", ans:"TikTok" },
      { v:200, clue:"Originally a photo-sharing app, this Meta-owned platform introduced Stories and Reels to compete with rivals.", ans:"Instagram" },
      { v:300, clue:"This platform, originally limited to 140-character posts, was rebranded by Elon Musk as X.", ans:"Twitter" },
      { v:400, clue:"This multimedia messaging app became famous for disappearing photos, streaks, and facial filter lenses.", ans:"Snapchat" },
      { v:500, clue:"Popular among gamers, this text, voice, and video communication platform uses servers instead of standard group chats.", ans:"Discord" },
      { v:600, clue:"This video-sharing platform launched the careers of creators like MrBeast and is the second-most visited website in the world.", ans:"YouTube" }
    ]},
    { cat: "Apartheid in South Africa", qs: [
      { v:100, clue:"He spent 27 years in prison before becoming South Africa's first black president in 1994.", ans:"Nelson Mandela" },
      { v:200, clue:"This Afrikaans word translates literally to apartness or separateness in English.", ans:"Apartheid" },
      { v:300, clue:"Under Apartheid laws, this term referred to the underdeveloped, segregated urban living areas reserved for non-white residents outside city centers.", ans:"Township" },
      { v:400, clue:"Under the Group Areas Act, black South Africans were forced to carry these documents at all times to enter white-designated zones.", ans:"Pass Laws (Passbooks)" },
      { v:500, clue:"This global organization officially declared Apartheid a crime against humanity and instituted economic boycotts.", ans:"The United Nations (UN)" },
      { v:600, clue:"This specific political party came to power in South Africa in 1948 and officially instituted the laws of Apartheid.", ans:"The National Party" }
    ]},
    { cat: "Ethnic Minorities in the USA", qs: [
      { v:100, clue:"This Baptist minister and civil rights activist delivered the famous I Have a Dream speech in Washington, D.C.", ans:"Martin Luther King Jr." },
      { v:200, clue:"In 1960, at just 6 years old, she became the first African American child to integrate an all-white elementary school in the South, escorted by US Marshals.", ans:"Ruby Bridges" },
      { v:300, clue:"The 1955 murder of this 14-year-old Chicago boy in Mississippi, and his mother's decision to hold an open-casket funeral, galvanized the Civil Rights Movement.", ans:"Emmett Till" },
      { v:400, clue:"This chosen identity term specifically refers to Americans of Mexican descent, a label that grew into a powerful civil rights movement in the 1960s.", ans:"Chicano" },
      { v:500, clue:"This gender-neutral neologism is sometimes used to describe people of Latin American cultural or racial identity in the United States.", ans:"Latinx" },
      { v:600, clue:"This demographic stereotype praises a minority group for perceived socio-economic success, but is often criticized for masking ongoing racism and creating division.", ans:"Model Minority" }
    ]},
    { cat: "No Kings Movement", qs: [
      { v:100, clue:"This British monarch was the target of the American colonists' No Kings attitude during the Revolutionary War of 1776.", ans:"King George III" },
      { v:200, clue:"This modern political leader famously uses anti-establishment, drain the swamp rhetoric to rally people who want to strip power from elites.", ans:"Donald Trump" },
      { v:300, clue:"On the Gadsden flag — the historical Don't Tread on Me symbol — this is the background color.", ans:"Yellow" },
      { v:400, clue:"In 1989, students in Beijing gathered in this massive city square to protest for democracy before the government sent in tanks.", ans:"Tiananmen Square" },
      { v:500, clue:"This famous building in Washington, D.C., was the site of massive protests and a breach on January 6, 2021, by people challenging election results.", ans:"The US Capitol Building" },
      { v:600, clue:"This decentralized, anti-authority modern civil rights movement uses street demonstrations and social media to protest systemic police brutality against Black individuals.", ans:"Black Lives Matter (BLM)" }
    ]},
    { cat: "Manosphere", qs: [
      { v:100, clue:"This controversial British-American former kickboxer became a dominant, polarizing figure in the Manosphere through ultra-viral short clips.", ans:"Andrew Tate" },
      { v:200, clue:"This popular metaphor, taken from the movie The Matrix, is used in the Manosphere to describe waking up to perceived societal truths about gender dynamics.", ans:"The Red Pill" },
      { v:300, clue:"This Canadian clinical psychologist became highly influential in the Manosphere for his lectures on personal responsibility and his book 12 Rules for Life.", ans:"Jordan Peterson" },
      { v:400, clue:"This popular streaming content creator and internet personality is widely known for his association with Andrew Tate and his raw, unfiltered broadcasts.", ans:"Sneako" },
      { v:500, clue:"This 2024 Netflix documentary series explores the algorithms, psychological hooks, and real-world impacts of online male supremacy groups.", ans:"Inside the Manosphere" },
      { v:600, clue:"This specific demographic group is the primary target for the algorithmically driven, highly aggressive content produced by modern Manosphere influencers.", ans:"Young Men / Teen Boys" }
    ]}
  ];

  const NUM_COLS = DATA.length;
  let teamCount = 3;
  let teams = [];
  let scores = [];
  let used = {};
  let activeQuestion = null;

  function renderTeamInputs() {
    const list = document.getElementById('team-names-list');
    const existing = Array.from(list.querySelectorAll('input')).map(i => i.value);
    list.innerHTML = '';
    for (let i = 0; i < teamCount; i++) {
      const row = document.createElement('div');
      row.className = 'team-input-row';
      const dot = document.createElement('div');
      dot.className = 'team-dot';
      dot.style.background = TEAM_COLORS[i];
      const inp = document.createElement('input');
      inp.type = 'text';
      inp.placeholder = 'Team ' + (i + 1);
      inp.maxLength = 20;
      if (existing[i]) inp.value = existing[i];
      row.appendChild(dot);
      row.appendChild(inp);
      list.appendChild(row);
    }
  }

  document.getElementById('dec-btn').addEventListener('click', function() {
    if (teamCount > 2) {
      teamCount--;
      document.getElementById('count-disp').textContent = teamCount;
      renderTeamInputs();
    }
  });

  document.getElementById('inc-btn').addEventListener('click', function() {
    if (teamCount < 6) {
      teamCount++;
      document.getElementById('count-disp').textContent = teamCount;
      renderTeamInputs();
    }
  });

  document.getElementById('start-btn').addEventListener('click', function() {
    var inputs = document.querySelectorAll('#team-names-list input');
    teams = [];
    for (var i = 0; i < inputs.length; i++) {
      teams.push(inputs[i].value.trim() || inputs[i].placeholder);
    }
    scores = teams.map(function() { return 0; });
    used = {};
    showGame();
  });

  function showScreen(id) {
    var screens = ['setup-screen','game-screen','final-screen'];
    screens.forEach(function(s) {
      var el = document.getElementById(s);
      el.classList.remove('active');
      el.style.display = 'none';
    });
    var target = document.getElementById(id);
    if (id === 'setup-screen') {
      target.style.display = 'flex';
    } else if (id === 'game-screen') {
      target.style.display = 'flex';
    } else if (id === 'final-screen') {
      target.style.display = 'flex';
    }
    target.classList.add('active');
  }

  function showGame() {
    showScreen('game-screen');
    buildBoard();
    renderScoreboard();
  }

  function renderScoreboard() {
    var sb = document.getElementById('scoreboard');
    sb.innerHTML = '';
    teams.forEach(function(t, i) {
      var card = document.createElement('div');
      card.className = 'score-card';
      card.id = 'score-card-' + i;
      card.innerHTML = '<div class="tname" style="color:' + TEAM_COLORS[i] + '">' + t + '</div><div class="tscore" id="score-val-' + i + '">' + scores[i] + '</div>';
      sb.appendChild(card);
    });
  }

  function buildBoard() {
    var board = document.getElementById('board');
    board.style.gridTemplateColumns = 'repeat(' + NUM_COLS + ', 1fr)';
    board.innerHTML = '';

    DATA.forEach(function(col) {
      var h = document.createElement('div');
      h.className = 'cat-header';
      h.textContent = col.cat;
      board.appendChild(h);
    });

    for (var row = 0; row < 6; row++) {
      DATA.forEach(function(col, ci) {
        var q = col.qs[row];
        var key = ci + '-' + row;
        var cell = document.createElement('div');
        cell.className = 'cell' + (used[key] ? ' used' : '');
        cell.textContent = used[key] ? '' : '$' + q.v;
        if (!used[key]) {
          (function(c, ci2, row2, q2, k) {
            c.addEventListener('click', function() {
              openModal(ci2, row2, q2, k);
            });
          })(cell, ci, row, q, key);
        }
        board.appendChild(cell);
      });
    }
  }

  function openModal(ci, row, q, key) {
    activeQuestion = { ci: ci, row: row, q: q, key: key };
    document.getElementById('modal-cat').textContent = DATA[ci].cat;
    document.getElementById('modal-value').textContent = '$' + q.v;
    document.getElementById('modal-clue').textContent = q.clue;
    document.getElementById('modal-answer').style.display = 'none';
    document.getElementById('modal-answer').textContent = 'What is: ' + q.ans;
    document.getElementById('scoring-row').style.display = 'none';
    document.getElementById('reveal-btn').style.display = 'block';
    buildScoringBtns(q.v);
    document.getElementById('modal').classList.remove('hidden');
  }

  function buildScoringBtns(v) {
    var cb = document.getElementById('correct-btns');
    var wb = document.getElementById('wrong-btns');
    cb.innerHTML = '';
    wb.innerHTML = '';
    teams.forEach(function(t, i) {
      var btnC = document.createElement('button');
      btnC.className = 'team-score-btn';
      btnC.style.borderColor = TEAM_COLORS[i];
      btnC.style.color = TEAM_COLORS[i];
      btnC.textContent = '+$' + v + ' ' + t;
      btnC.addEventListener('mouseover', function() { btnC.style.background = TEAM_COLORS[i]; btnC.style.color = '#060b2e'; });
      btnC.addEventListener('mouseout', function() { btnC.style.background = 'transparent'; btnC.style.color = TEAM_COLORS[i]; });
      (function(idx) {
        btnC.addEventListener('click', function() {
          scores[idx] += v;
          document.getElementById('score-val-' + idx).textContent = scores[idx];
        });
      })(i);
      cb.appendChild(btnC);

      var btnW = document.createElement('button');
      btnW.className = 'team-score-btn';
      btnW.style.borderColor = '#f87171';
      btnW.style.color = '#f87171';
      btnW.textContent = '-$' + v + ' ' + t;
      btnW.addEventListener('mouseover', function() { btnW.style.background = '#f87171'; btnW.style.color = '#060b2e'; });
      btnW.addEventListener('mouseout', function() { btnW.style.background = 'transparent'; btnW.style.color = '#f87171'; });
      (function(idx) {
        btnW.addEventListener('click', function() {
          scores[idx] -= v;
          document.getElementById('score-val-' + idx).textContent = scores[idx];
        });
      })(i);
      wb.appendChild(btnW);
    });
  }

  document.getElementById('reveal-btn').addEventListener('click', function() {
    document.getElementById('modal-answer').style.display = 'block';
    document.getElementById('scoring-row').style.display = 'flex';
    document.getElementById('reveal-btn').style.display = 'none';
  });

  document.getElementById('close-btn').addEventListener('click', function() {
    if (activeQuestion) {
      used[activeQuestion.key] = true;
      var allCells = document.querySelectorAll('#board .cell');
      allCells.forEach(function(c, idx) {
        var ciX = idx % NUM_COLS;
        var rowX = Math.floor(idx / NUM_COLS);
        if (ciX === activeQuestion.ci && rowX === activeQuestion.row) {
          c.classList.add('used');
          c.textContent = '';
        }
      });
      activeQuestion = null;
    }
    document.getElementById('modal').classList.add('hidden');
    checkGameOver();
  });

  function checkGameOver() {
    if (Object.keys(used).length >= DATA.length * 6) {
      showFinal();
    }
  }

  function showFinal() {
    showScreen('final-screen');
    var maxScore = Math.max.apply(null, scores);
    var winners = teams.filter(function(_, i) { return scores[i] === maxScore; });
    document.getElementById('winner-text').textContent = '🏆 ' + winners.join(' & ') + ' WIN!';
    var fsDiv = document.getElementById('final-scores');
    fsDiv.innerHTML = '';
    var sorted = teams.map(function(t, i) { return { t: t, s: scores[i], i: i }; });
    sorted.sort(function(a, b) { return b.s - a.s; });
    sorted.forEach(function(item) {
      var row = document.createElement('div');
      row.className = 'final-row' + (item.s === maxScore ? ' winner' : '');
      row.innerHTML = '<span class="fname" style="color:' + TEAM_COLORS[item.i] + '">' + item.t + '</span><span class="fscore">$' + item.s + '</span>';
      fsDiv.appendChild(row);
    });
  }

  document.getElementById('play-again-btn').addEventListener('click', function() {
    used = {};
    scores = teams.map(function() { return 0; });
    showScreen('setup-screen');
    document.getElementById('count-disp').textContent = teamCount;
    renderTeamInputs();
  });

  renderTeamInputs();
</script>
